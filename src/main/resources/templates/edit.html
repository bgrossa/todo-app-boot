<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>タスク編集</title>	

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
	  rel="stylesheet">

</head>

<body class="container mt-5">

<div class="card">
			
	<div class="card-body">
		<h1 class="mb-4">タスク編集</h1>
		
		<form action="/update" method="post">
			
			<input type="hidden"
				   name="id"
				   th:value="${task.id}">
				   
		    <input type="text"
			   	   name="taskName"
				   class="form-control mb-3"
			   	   th:value="${task.name}">
			
			<select name="priority"
					class="form-select mb-3"
					required>
				
				<option value="高"
						th:selected="${task.priority == '高'}">高</option>
				<option value="中"
						th:selected="${task.priority == '中'}">中</option>
				<option value="低"
						th:selected="${task.priority == '低'}">低</option>
				
			</select>
			
			<input type="date"
				   name="deadline"
				   class="form-control mb-3"
				   th:value="${task.deadline}">
				   
			<button type="submit"
					class="btn btn-primary">
				保存
			</button>
			
			<a href="/"
			   class="btn btn-secondary">
		   		戻る
		   </a>
		
		</form>
				
	</div>
</div>

</body>
</html>
