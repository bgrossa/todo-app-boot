<!DOCTYPE html>
<html>
<head>
	<meta charset="UTF-8">
	<title>TODOアプリ</title>
	
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
		  rel="stylesheet">
</head>

<body class="container mt-5">

<div class="card">
	
	<div class="card-body">
		
		<h1 class="mb-4">
			TODOアプリ
		</h1>
		
		<p class="text-muted">
			登録件数：[[${taskCount}]]件
			／
			完了：[[${completedCount}]]件
		</p>
	
		<form action="/add"
			  method="post"
			  class="d-flex gap-2 mb-4">
			
			<input type="text"
				   name="taskName"
				   class="form-control"
				   placeholder="タスクを入力"
				   required>
				   
			<select name="priority"
					class="form-select mb-3"
					required>
				<option value="高">高</option>
				<option value="中" selected>中</option>
				<option value="低">低</option>
			</select>
			
			<input type="date"
				   name="deadline"
				   class="form-control">
			
			<button type="submit"
					class="btn btn-primary">
				追加
			</button>
		</form>
		<form action="/" method="get">
			<input type="text"
				   name="keyword"
				   placeholder="検索">
				   
			<button type="submit">
				検索
			</button>
		</form>
				
	</div>
	
</div>

<hr>
	
	<h2>未完了</h2>
	
		<ul class="list-group mb-4">
			
			<li th:each="task, stat : ${tasks}"
				th:if="${!task.completed}"
				class="list-group-item d-flex justify-content-between align-items-center">
				
				<span>
					[[${task.name}]]
					
					<span th:if="${task.priority == '高'}"
						  class="badge bg-danger">
						高
					</span>
					
					<span th:if="${task.priority == '中'}"
						  class="badge bg-warning">
						中
					</span>
					
					<span th:if="${task.priority == '低'}"
						  class="badge bg-success">
						低
					</span>
					
					<br>
					
					<small th:if="${task.deadline != null && task.deadline != '' && task.deadline < today}"
						   class="text-danger fw-bold">
						期限：[[${task.deadline}]] ※期限切れ
					</small>

					<small th:if="${task.deadline == null || task.deadline == '' || task.deadline >= today}"
						   class="text-muted">
						期限：[[${task.deadline}]]
					</small>
					
				</span>
				
				<div>
					
					<!-- 編集 -->
					<form action="/edit"
						  method="get"
						  style="display:inline;">
						  
						<input type="hidden"
							   name="index"
							   th:value="${stat.index}">
							   
						<button type="submit"
								class="btn btn-secondary btn-sm">
							編集
						</button>
						
					</form>

				
					<!-- 完了 -->
					<form action="/complete"
						  method="post"
						  style="display:inline;">
					
						<input type="hidden"
							   name="index"
							   th:value="${stat.index}">
						   
						<button type="submit"
								class="btn btn-success btn-sm">
							完了
						</button>
					</form>
					
					<!-- 削除 -->
					<form action="/delete"
						  method="post"
						  style="display:inline;">
								
						<input type="hidden"
							   name="index"
							   th:value="${stat.index}">
									   
						<button type="submit"
								class="btn btn-danger btn-sm">
							削除
						</button>
					</form>
					
				</div>
	
			</li>
			
		</ul>
	
<hr>
		
	<h2>完了済み</h2>

		<ul class="list-group">
				
			<li th:each="task, stat : ${tasks}"
				th:if="${task.completed}"
				class="list-group-item d-flex justify-content-between align-items-center">
				
				<span style="text-decoration: line-through; color: gray;">
					[[${task.name}]]
					
					<span th:if="${task.priority == '高'}"
						  class="badge bg-danger">
						高
					</span>

					<span th:if="${task.priority == '中'}"
						  class="badge bg-warning">
						中
					</span>

					<span th:if="${task.priority == '低'}"
						  class="badge bg-success">
						低
					</span>
					
					<br>
					
					<small th:if="${task.deadline != null && task.deadline != '' && task.deadline < today}"
						   class="text-danger fw-bold">
						期限：[[${task.deadline}]] ※期限切れ
					</small>

					<small th:if="${task.deadline == null || task.deadline == '' || task.deadline >= today}"
						   class="text-muted">
						期限：[[${task.deadline}]]
					</small>
					
				</span>
				
				<div>
				
					<!-- 戻す -->
					<form action="/undo"
						  method="post"
						  style="display:inline;">
											
						<input type="hidden"
						 	   name="index"
						   	   th:value="${stat.index}">
												   
						<button type="submit"
								class="btn btn-warning btn-sm">
							戻す
						</button>
					</form>
					
					<!-- 削除 -->
					<form action="/delete"
						  method="post"
						  style="display:inline;">
								
						<input type="hidden"
							   name="index"
							   th:value="${stat.index}">
									   
						<button type="submit"
								class="btn btn-danger btn-sm">
							削除
						</button>
					</form>
				</div>
			</li>
		</ul>
	
</body>
</html>
