<!DOCTYPE html>
<html>
<head>
	<meta charset="UTF-8">
	<title>TODOアプリ</title>
	
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
		  rel="stylesheet">
</head>

<body class="container mt-5">

<div class="card">
	
	<div class="card-body">
		
		<h1 class="mb-4">
			TODOアプリ
		</h1>
	
		<form action="/add"
			  method="post"
			  class="d-flex gap-2 mb-4">
			
			<input type="text"
				   name="taskName"
				   class="form-control"
				   placeholder="タスクを入力">
			
			<button type="submit"
					class="btn btn-primary">
				追加
			</button>
			
		</form>
	
	</div>
	
</div>
		
<hr>
	
	<h2>未完了</h2>
	
		<ul class="list-group mb-4">
			
			<li th:each="task, stat : ${tasks}"
				th:if="${!task.completed}"
				class="list-group-item d-flex justify-content-between align-items-center">
				
				<span>[[${task.name}]]</span>
				
				<div>
				
					<!-- 完了 -->
					<form action="/complete"
						  method="post"
						  style="display:inline;">
					
						<input type="hidden"
							   name="index"
							   th:value="${stat.index}">
						   
						<button type="submit"
								class="btn btn-success btn-sm">
							完了
						</button>
					</form>
					
					<!-- 削除 -->
					<form action="/delete"
						  method="post"
						  style="display:inline;">
								
						<input type="hidden"
							   name="index"
							   th:value="${stat.index}">
									   
						<button type="submit"
								class="btn btn-danger btn-sm">
							削除
						</button>
					</form>
					
				</div>
	
			</li>
			
		</ul>
	
<hr>
		
	<h2>完了済み</h2>

		<ul class="list-group">
				
			<li th:each="task, stat : ${tasks}"
				th:if="${task.completed}"
				class="list-group-item d-flex justify-content-between align-items-center">
				
				<span style="text-decoration: line-through; color: gray;">
					[[${task.name}]]
				</span>
				
				<div>
				
					<!-- 戻す -->
					<form action="/undo"
						  method="post"
						  style="display:inline;">
											
						<input type="hidden"
						 	   name="index"
						   	   th:value="${stat.index}">
												   
						<button type="submit"
								class="btn btn-warning btn-sm">
							戻す
						</button>
					</form>
					
					<!-- 削除 -->
					<form action="/delete"
						  method="post"
						  style="display:inline;">
								
						<input type="hidden"
							   name="index"
							   th:value="${stat.index}">
									   
						<button type="submit"
								class="btn btn-danger btn-sm">
							削除
						</button>
					</form>
				</div>
			</li>
		</ul>
	
</body>
</html>
